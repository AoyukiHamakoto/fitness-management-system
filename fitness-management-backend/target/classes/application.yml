# =============================================================================
# 个人智能健身管理系统 - 后端配置（Spring Boot 3.2.0）
# 编码：UTF-8 | 说明：请按环境修改标注为「请填写」的项，敏感信息建议走环境变量
# =============================================================================

# -----------------------------------------------------------------------------
# 1. 服务器
# -----------------------------------------------------------------------------
server:
  port: 8080
  servlet:
    # 全局 API 前缀：实际访问示例 http://localhost:8080/fitness-api/xxx
    context-path: /fitness-api

# -----------------------------------------------------------------------------
# 2. 数据源（MySQL 8.0 + HikariCP）
# -----------------------------------------------------------------------------
spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/fitness_mvp?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    # 本地开发默认 root / 123456；生产请改密并通过环境变量 MYSQL_USERNAME、MYSQL_PASSWORD 覆盖
    username: "${MYSQL_USERNAME:root}"
    password: "${MYSQL_PASSWORD:123456}"
    type: com.zaxxer.hikari.HikariDataSource
    hikari:
      pool-name: FitnessHikariPool
      minimum-idle: 5
      maximum-pool-size: 20
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
      connection-test-query: SELECT 1

  # ---------------------------------------------------------------------------
  # 3. Redis（Lettuce 客户端 + 连接池）
  # ---------------------------------------------------------------------------
  data:
    redis:
      host: localhost
      port: 6379
      database: 0
      # 请填写：Redis 密码；无密码则保持空字符串或通过环境变量 REDIS_PASSWORD
      password: "${REDIS_PASSWORD:}"
      timeout: 3000ms
      lettuce:
        pool:
          enabled: true
          max-active: 8
          max-idle: 8
          min-idle: 0
          max-wait: -1ms

  # ---------------------------------------------------------------------------
  # 7. 文件上传（Multipart）
  # ---------------------------------------------------------------------------
  servlet:
    multipart:
      enabled: true
      max-file-size: 20MB
      max-request-size: 50MB
      file-size-threshold: 2MB

# -----------------------------------------------------------------------------
# 4. MyBatis-Plus
# -----------------------------------------------------------------------------
mybatis-plus:
  # XML 映射文件位置（与 src/main/resources/mapper下文件对应）
  mapper-locations: classpath:mapper/*.xml
  # 实体类别名扫描包（含 user/plan/checkin/ai 等子包）
  type-aliases-package: com.fitness.management.entity
  configuration:
    # 开启驼峰命名映射（表字段 user_name ->实体 userName）
    map-underscore-to-camel-case: true
    # SQL 日志：开发环境打印至日志（配合下方 logging.level）
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl
  # 如需全局主键策略、逻辑删除等，可在此增加 global-config.db-config（勿写空 {}，否则与 MP 3.5.x 绑定冲突）

# -----------------------------------------------------------------------------
# 5. JWT（登录令牌）
# -----------------------------------------------------------------------------
jwt:
  # 请填写：签名密钥（生产环境须足够长且随机，勿提交仓库；HS256 建议至少 32 字节）
  secret: "${JWT_SECRET:fitness-mvp-dev-secret-key-please-change-123456}"
  # 过期时间：毫秒（86400000 = 24 小时，与 JwtUtils / JwtProperties 对齐）
  expiration: 86400000

# -----------------------------------------------------------------------------
# 6. 大模型 API（OpenAI 兼容：Bearer + /v1/chat/completions 类接口）
# -----------------------------------------------------------------------------
llm:
  # 请填写：API Key（请求头 Authorization: Bearer {api-key}）
  api-key: "${LLM_API_KEY:}"
  # 请填写：对话补全完整 URL（示例为 OpenAI；国内兼容服务请替换为厂商给定地址）
  api-url: "${LLM_API_URL:https://api.openai.com/v1/chat/completions}"
  # 请填写：模型名称（与服务商文档一致，如 gpt-4o-mini、deepseek-chat 等）
  model-name: "${LLM_MODEL_NAME:gpt-4o-mini}"

# -----------------------------------------------------------------------------
# 7. 跨域（供自定义 WebMvcConfigurer / CorsFilter 读取，非 Spring 内置项）
# -----------------------------------------------------------------------------
cors:
  # 多个源用英文逗号分隔；生产环境请改为实际前端域名
  allowed-origins: http://localhost:5173,http://127.0.0.1:5173
  allowed-methods: GET,POST,PUT,DELETE,OPTIONS,PATCH
  allowed-headers: "*"
  allow-credentials: true
  max-age: 3600

# -----------------------------------------------------------------------------
# 8. 日志
# -----------------------------------------------------------------------------
logging:
  level:
    root: INFO
    com.fitness.management: DEBUG
    # MyBatis Mapper 接口所在包：打印 SQL 与参数（上线可改为 INFO）
    com.fitness.management.mapper: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{50} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{50} - %msg%n"
  file:
    name: logs/fitness-mvp.log
  logback:
    rollingpolicy:
      max-file-size: 10MB
      max-history: 30
      total-size-cap: 1GB
